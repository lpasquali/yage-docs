# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265

  docs:
    uses: lpasquali/rune-ci/.github/workflows/docs-quality.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265

  compliance:
    needs: [security, docs]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@144ef855dbf0420e5d9a8de2c8d8f89c2e789265
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "docs,security"
